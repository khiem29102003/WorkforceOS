services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: workforce_os
      POSTGRES_USER: ewos
      POSTGRES_PASSWORD: ewos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewos -d workforce_os"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: >
      sh -c "corepack pnpm --filter @ewos/database db:push &&
             corepack pnpm --filter @ewos/database db:seed &&
             corepack pnpm --filter @ewos/api start:prod"
    environment:
      DATABASE_URL: postgresql://ewos:ewos@postgres:5432/workforce_os?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-before-shipping}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      AI_PROVIDER: disabled
      AI_RATE_LIMIT_PER_HOUR: "25"
      NODE_ENV: development
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-before-shipping}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
